<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juegos Mentales Marzo 2026</title>
    <style>
        :root { --purple: #46178f; --blue: #1368ce; --green: #26890c; --red: #e21b3c; --orange: #d56a00; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f2f2f2; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 90%; max-width: 500px; text-align: center; position: relative; }
        input { width: 85%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; }
        button { background: var(--purple); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 92%; margin-top: 10px; transition: 0.2s; }
        button:hover { filter: brightness(1.1); }
        .btn-ranking { background: var(--blue) !important; }
        .btn-salir { background: #666 !important; margin-top: 20px; }
        .timer { font-size: 2rem; font-weight: 900; color: var(--purple); background: #eee; width: 70px; height: 70px; line-height: 70px; border-radius: 50%; margin: 10px auto; border: 4px solid var(--purple); }
        
        /* ESTILOS DE OPCIONES CORREGIDOS */
        .opciones-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .opcion { padding: 20px 10px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; min-height: 60px; text-align: center; font-size: 1rem; transition: transform 0.1s; border: none; }
        .opcion:active { transform: scale(0.95); }
        
        /* COLORES DE LOS BOTONES (Faltaban en tu versión anterior) */
        .btn-0 { background-color: var(--red) !important; }
        .btn-1 { background-color: var(--blue) !important; }
        .btn-2 { background-color: var(--orange) !important; }
        .btn-3 { background-color: var(--green) !important; }

        .ranking-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; font-size: 0.95rem; }
        .admin-item { background: #fff9e6 !important; border-left: 4px solid gold; }
        .admin-tag { color: #d4af37; font-weight: bold; font-size: 0.75rem; border: 1px solid #d4af37; padding: 2px 5px; border-radius: 4px; margin-left: 5px; }
        #game-section, #ranking-section, #loading, #admin-selector { display: none; }
        .flash-verde { background-color: #2ecc71 !important; }
        .flash-rojo { background-color: #e74c3c !important; }
        .sacudir { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <div id="login-section">
        <h2 style="color: var(--purple);">🏆 Juegos Mentales 2026</h2>
        <input type="text" id="user" placeholder="Usuario (Siglas)">
        <input type="password" id="pass" placeholder="Contraseña">
        <button id="btnLogin" onclick="intentarLogin()">INICIAR</button>
    </div>

    <div id="admin-selector">
        <h3 style="color: #d4af37;">👑 Panel Administrador</h3>
        <button class="btn-ranking" onclick="verRankingDirecto()">VER RANKING GLOBAL</button>
        <button onclick="comenzarJuegoAdmin()">JUGAR / TESTEAR</button>
        <button class="btn-salir" onclick="cerrarSesion()">CERRAR SESIÓN</button>
    </div>

    <div id="loading">
        <p><strong>Cargando datos...</strong></p>
    </div>

    <div id="game-section">
        <div id="timer" class="timer">30</div>
        <h3 id="pregunta-texto">...</h3>
        <div class="opciones-grid" id="opciones-container"></div>
    </div>

    <div id="ranking-section">
        <h2 id="titulo-ranking">📊 Ranking</h2>
        <div id="lista-ranking" style="max-height: 350px; overflow-y: auto;"></div>
        <button class="btn-salir" onclick="cerrarSesion()">CERRAR SESIÓN</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwtvxISD0sbBDgO3QIhZebCTpKxzXN83Cjv6vOzb9jWvapYzW0rxfvPWPifQcSffx_gtw/exec";
    
    const usuariosPermitidos = {
        "JR": { cl: "josue2026", adm: true }, 
        "MG": { cl: "Lara479", adm: true },
        "MA": { cl: "Tero012", adm: false },
        "JL": { cl: "zulu098", adm: false }, 
        "RC": { cl: "Roger345", adm: false },
        "FO": { cl: "Nigan367", adm: false }, 
        "LD": { cl: "Zeta007", adm: false },
        "LV": { cl: "Puma235", adm: false }, 
        "MC": { cl: "pipa401", adm: false },
        "LG": { cl: "Condor666", adm: false },
        "SR": { cl: "Virus557", adm: false }, 
        "PRUEBA": { cl: "prueba2026", adm: false }
    };

    const preguntas = [
        { p: "¿Cuál es el lugar más frío de la Tierra?", r: ["La Antártida", "Siberia", "Groenlandia", "Alaska"], c: 0 },
        { p: "¿El sonido viaja más rápido en el agua que en el aire?", r: ["Verdadero", "Falso"], c: 0 },
        { p: "¿Quién pintó 'La última cena'?", r: ["Miguel Ángel", "Da Vinci", "Picasso", "Van Gogh"], c: 1 },
        { p: "¿Cuál es el río más largo del mundo?", r: ["Nilo", "Amazonas", "Misisipi", "Yangtsé"], c: 1 },
        { p: "¿Los tiburones son mamíferos?", r: ["Verdadero", "Falso"], c: 1 },
        { p: "¿En qué continente está el desierto del Sahara?", r: ["Asia", "América", "África", "Oceanía"], c: 2 },
        { p: "¿Cuál es el símbolo químico del Oro?", r: ["Ag", "Fe", "Au", "Or"], c: 2 },
        { p: "¿El Everest es la montaña más alta sobre el nivel del mar?", r: ["Verdadero", "Falso"], c: 0 },
        { p: "¿País más grande del mundo por superficie?", r: ["China", "Rusia", "Canadá", "EE.UU."], c: 1 },
        { p: "¿En qué año llegó el hombre a la Luna?", r: ["1969", "1955", "1972", "1961"], c: 0 },
        { p: "¿Las hormigas nunca duermen?", r: ["Verdadero", "Falso"], c: 1 },
        { p: "¿Idioma con más hablantes nativos?", r: ["Inglés", "Español", "Chino Mandarín", "Hindi"], c: 2 },
        { p: "¿Cuál es el planeta más cercano al Sol?", r: ["Venus", "Marte", "Mercurio", "Tierra"], c: 2 },
        { p: "¿La Gran Muralla China se ve desde la Luna?", r: ["Verdadero", "Falso"], c: 1 },
        { p: "¿Autor de 'Don Quijote de la Mancha'?", r: ["Cervantes", "García Márquez", "Lope de Vega", "Quevedo"], c: 0 }
    ];

    let usuarioActual = null;
    let indexPregunta = 0;
    let puntosTotales = 0;
    let tRestante = 30;
    let timerInterv;

    window.onload = function() {
        const sesionGuardada = localStorage.getItem('sesion_activa');
        if (sesionGuardada) {
            usuarioActual = JSON.parse(sesionGuardada);
            if (usuarioActual.adm) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-selector').style.display = 'block';
            } else {
                verRankingDirecto();
            }
        }
    };

    async function intentarLogin() {
        const u = document.getElementById('user').value.toUpperCase().trim();
        const p = document.getElementById('pass').value;
        if (usuariosPermitidos[u] && usuariosPermitidos[u].cl === p) {
            usuarioActual = { id: u, adm: usuariosPermitidos[u].adm };
            localStorage.setItem('sesion_activa', JSON.stringify(usuarioActual));
            if (usuarioActual.adm) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-selector').style.display = 'block';
            } else {
                if (localStorage.getItem('ya_jugo_' + u)) {
                    verRankingDirecto();
                } else {
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('game-section').style.display = 'block';
                    cargarPregunta();
                }
            }
        } else { alert("Datos incorrectos"); }
    }

    async function verRankingDirecto() {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('admin-selector').style.display = 'none';
        document.getElementById('loading').style.display = 'block';
        try {
            const resp = await fetch(SCRIPT_URL);
            const data = await resp.json();
            mostrarRanking(data);
        } catch (e) {
            alert("Error al conectar con la base de datos.");
            cerrarSesion();
        }
    }

    function mostrarRanking(data) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('ranking-section').style.display = 'block';
        
        let lista = data.map(row => {
            const id = String(row[0]).toUpperCase().trim();
            const esAdmin = (id === "JR" || id === "MG" || String(row[3]).toUpperCase() === "TRUE");
            return { id, pts: parseInt(row[1]) || 0, esAdmin };
        });

        if (!usuarioActual.adm) {
            lista = lista.filter(u => !u.esAdmin);
            document.getElementById('titulo-ranking').innerText = "📊 Ranking de Jugadores";
        } else {
            document.getElementById('titulo-ranking').innerText = "📊 Ranking Global (Admin)";
        }

        lista.sort((a, b) => b.pts - a.pts);

        let html = "";
        lista.forEach((u, i) => {
            html += `<div class="ranking-item ${u.esAdmin ? 'admin-item' : ''}">
                <span>${i + 1}. <b>${u.id}</b> ${u.esAdmin ? '<span class="admin-tag">👑 ADMIN</span>' : ''}</span>
                <span>${u.pts} pts</span>
            </div>`;
        });
        document.getElementById('lista-ranking').innerHTML = html || "<p>Sin datos.</p>";
    }

    function cargarPregunta() {
        if (indexPregunta >= preguntas.length) return finalizar();
        tRestante = 30;
        document.getElementById('timer').innerText = tRestante;
        document.getElementById('pregunta-texto').innerText = preguntas[indexPregunta].p;
        const cont = document.getElementById('opciones-container');
        cont.innerHTML = "";
        preguntas[indexPregunta].r.forEach((opc, i) => {
            const d = document.createElement('button');
            d.className = `opcion btn-${i}`;
            d.innerText = opc;
            d.onclick = () => validar(i);
            cont.appendChild(d);
        });
        timerInterv = setInterval(() => {
            tRestante--;
            document.getElementById('timer').innerText = tRestante;
            if (tRestante <= 0) { clearInterval(timerInterv); validar(-1); }
        }, 1000);
    }

    function validar(idx) {
        clearInterval(timerInterv);
        const correcta = preguntas[indexPregunta].c === idx;
        if (correcta) {
            document.body.classList.add('flash-verde');
            puntosTotales += Math.round(500 + (tRestante * 16.66));
        } else {
            document.body.classList.add('flash-rojo');
            document.getElementById('main-card').classList.add('sacudir');
        }
        setTimeout(() => {
            document.body.classList.remove('flash-verde', 'flash-rojo');
            document.getElementById('main-card').classList.remove('sacudir');
            indexPregunta++;
            cargarPregunta();
        }, 1000);
    }

    async function finalizar() {
        document.getElementById('game-section').style.display = 'none';
        document.getElementById('loading').style.display = 'block';
        if (!usuarioActual.adm) localStorage.setItem('ya_jugo_' + usuarioActual.id, "true");
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ usuario: usuarioActual.id, puntos: puntosTotales, esAdmin: usuarioActual.adm }) });
        setTimeout(verRankingDirecto, 2000);
    }

    function comenzarJuegoAdmin() {
        document.getElementById('admin-selector').style.display = 'none';
        document.getElementById('game-section').style.display = 'block';
        cargarPregunta();
    }

    function cerrarSesion() {
        localStorage.removeItem('sesion_activa');
        location.reload();
    }
</script>
</body>
</html>
