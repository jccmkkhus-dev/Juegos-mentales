<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juegos Mentales Abril 2026</title>
    <style>
        :root { --purple: #46178f; --blue: #1368ce; --green: #26890c; --red: #e21b3c; --orange: #d56a00; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f2f2f2; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 95%; max-width: 600px; text-align: center; position: relative; }
        
        .progreso { position: absolute; top: 20px; right: 25px; background: var(--purple); color: white; padding: 5px 12px; border-radius: 15px; font-size: 0.85rem; font-weight: bold; }
        
        /* IMAGEN MÁS GRANDE */
        .pregunta-img { 
            width: 100%; 
            max-width: 550px; 
            height: auto; 
            border-radius: 12px; 
            margin: 15px 0; 
            display: none; 
            max-height: 400px; 
            object-fit: contain; 
            border: 3px solid #eee;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        input { width: 85%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; }
        button { background: var(--purple); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 92%; margin-top: 10px; transition: 0.2s; }
        button:hover { filter: brightness(1.1); }
        .btn-ranking { background: var(--blue) !important; }
        .btn-salir { background: #666 !important; margin-top: 20px; }
        
        .timer { font-size: 2rem; font-weight: 900; color: var(--purple); background: #eee; width: 70px; height: 70px; line-height: 70px; border-radius: 50%; margin: 10px auto; border: 4px solid var(--purple); }
        
        .opciones-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
        @media (min-width: 450px) { .opciones-grid { grid-template-columns: 1fr 1fr; } }

        .opcion { padding: 15px 10px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: flex-start; min-height: 55px; text-align: left; font-size: 0.95rem; transition: transform 0.1s; border: none; width: 100%; }
        .opcion span { background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 4px; margin-right: 10px; min-width: 20px; text-align: center; }
        
        .btn-0 { background-color: var(--red) !important; }
        .btn-1 { background-color: var(--blue) !important; }
        .btn-2 { background-color: var(--orange) !important; }
        .btn-3 { background-color: var(--green) !important; }
        .btn-4 { background-color: var(--purple) !important; }

        #game-section, #ranking-section, #loading, #admin-selector { display: none; }
        .flash-verde { background-color: #2ecc71 !important; }
        .flash-rojo { background-color: #e74c3c !important; }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <div id="progreso-texto" class="progreso" style="display: none;">1/20</div>

    <div id="login-section">
        <h2 style="color: var(--purple);">🏆 Juegos Mentales Abril</h2>
        <input type="text" id="user" placeholder="Usuario (Siglas)">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="intentarLogin()">INICIAR SESIÓN</button>
    </div>

    <div id="admin-selector">
        <h3 style="color: #d4af37;">👑 Panel Admin Abril</h3>
        <button class="btn-ranking" onclick="verRankingDirecto()">VER RANKING</button>
        <button onclick="comenzarJuegoAdmin()">PROBAR JUEGO</button>
        <button class="btn-salir" onclick="cerrarSesion()">CERRAR SESIÓN</button>
    </div>

    <div id="loading"><p>Procesando...</p></div>

    <div id="game-section">
        <div id="timer" class="timer">30</div>
        <img id="pregunta-imagen" class="pregunta-img" src="" alt="Imagen de la pregunta">
        <h3 id="pregunta-texto">Cargando...</h3>
        <div class="opciones-grid" id="opciones-container"></div>
    </div>

    <div id="ranking-section">
        <h2 id="titulo-ranking">📊 Ranking Abril 2026</h2>
        <div id="lista-ranking" style="max-height: 350px; overflow-y: auto;"></div>
        <button class="btn-salir" onclick="cerrarSesion()">CERRAR SESIÓN</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzqBCndi5xk3BnAQilJ1XeCHmaqvUfSLt9uZZvpL5qB03Ow8Befd_xlDbSehPQ8FAg9gQ/exec";
    
    const usuariosPermitidos = {
        "JR": { cl: "josue2026", adm: true }, "MG": { cl: "Lara479", adm: true },
        "MA": { cl: "Tero012", adm: false }, "JL": { cl: "zulu098", adm: false },
        "RC": { cl: "Roger345", adm: false }, "FO": { cl: "Nigan367", adm: false },
        "LD": { cl: "Zeta007", adm: false }, "LV": { cl: "Puma235", adm: false },
        "MC": { cl: "pipa401", adm: false }, "LG": { cl: "Condor666", adm: false },
        "SR": { cl: "Virus557", adm: false }, "PRUEBA": { cl: "prueba2026", adm: false }
    };

    const preguntas = [
        { p: "¿Cuál de estos snacks evita Leo?", r: ["Galleta de Arroz", "Manzana", "Banana", "Avena", "Chocolate"], c: 4 },
        { p: "¿Qué operador se identifica con el número 666?", r: ["Virus", "Negan", "Condor", "Pipa", "Tero"], c: 2 },
        { 
            p: "¿Quién es este operador?", 
            img: "https://i.ibb.co/S43g18WT/image-92a839.jpg", 
            r: ["Tero", "Pipa", "Roger", "Beraca", "Bukavu"], 
            c: 2 
        },
        
        // --- ESPACIO PARA TUS ÚLTIMAS 2 PREGUNTAS PERSONALIZADAS ---
        { p: "¿Qué ciudad es conocida como la 'Gran Manzana'?", r: ["Londres", "París", "Nueva York", "Roma", "Tokio"], c: 2 },
        { p: "¿En qué país se inventó el papel?", r: ["Egipto", "Grecia", "China", "India"], c: 2 },

        { p: "¿Cuál es el animal terrestre más veloz?", r: ["León", "Gacela", "Guepardo", "Caballo", "Tigre"], c: 2 },
        { p: "¿Qué satélite natural tiene la Tierra?", r: ["Titán", "Europa", "La Luna", "Ganímedes"], c: 2 },
        { p: "¿Cuál es el tercer planeta desde el Sol?", r: ["Marte", "Venus", "La Tierra", "Júpiter", "Saturno"], c: 2 },
        { p: "¿Qué continente tiene más países?", r: ["Asia", "América", "África", "Europa"], c: 2 },
        { p: "¿Idioma más hablado (nativos)?", r: ["Inglés", "Español", "Chino Mandarín", "Hindi", "Árabe"], c: 2 },
        { p: "¿Quién escribió la Odisea?", r: ["Sócrates", "Platón", "Homero", "Aristóteles"], c: 2 },
        { p: "¿Hueso más largo del cuerpo humano?", r: ["Cúbito", "Radio", "Fémur", "Tibia", "Peroné"], c: 2 },
        { p: "¿Qué país tiene forma de bota?", r: ["Grecia", "España", "Italia", "Portugal"], c: 2 },
        { p: "¿De qué color es la caja negra de los aviones?", r: ["Negro", "Naranja", "Rojo", "Azul", "Blanco"], c: 1 },
        { p: "¿Componente principal del Sol?", r: ["Oxígeno", "Carbono", "Hidrógeno", "Helio", "Nitrógeno"], c: 2 },
        { p: "¿El Sahara es el lugar más seco de la Tierra?", r: ["Verdadero", "Falso"], c: 1 },
        { p: "¿La luz viaja más rápido que el sonido?", r: ["Verdadero", "Falso"], c: 0 },
        { p: "¿Brasil es el único sudamericano que habla portugués?", r: ["Verdadero", "Falso"], c: 0 },
        { p: "¿Los seres humanos tienen 4 pulmones?", r: ["Verdadero", "Falso"], c: 1 },
        { p: "¿El oro es un buen conductor de electricidad?", r: ["Verdadero", "Falso"], c: 0 }
    ];

    let usuarioActual = null, indexPregunta = 0, puntosTotales = 0, tRestante = 30, timerInterv;
    const letras = ["A", "B", "C", "D", "E"];

    window.onload = function() {
        const sesion = localStorage.getItem('sesion_abril_v_final');
        if (sesion) {
            usuarioActual = JSON.parse(sesion);
            usuarioActual.adm ? mostrar('admin-selector') : verRankingDirecto();
        }
    };

    function mostrar(id) {
        ['login-section','admin-selector','game-section','ranking-section','loading'].forEach(s => document.getElementById(s).style.display = 'none');
        document.getElementById('progreso-texto').style.display = (id === 'game-section') ? 'block' : 'none';
        document.getElementById(id).style.display = 'block';
    }

    async function intentarLogin() {
        const u = document.getElementById('user').value.toUpperCase().trim(), p = document.getElementById('pass').value;
        if (usuariosPermitidos[u] && usuariosPermitidos[u].cl === p) {
            usuarioActual = { id: u, adm: usuariosPermitidos[u].adm };
            localStorage.setItem('sesion_abril_v_final', JSON.stringify(usuarioActual));
            if (usuarioActual.adm) mostrar('admin-selector');
            else localStorage.getItem('jugado_abril_v_final_'+u) ? verRankingDirecto() : comenzarJuego();
        } else alert("Credenciales incorrectas");
    }

    function comenzarJuego() { mostrar('game-section'); cargarPregunta(); }
    function comenzarJuegoAdmin() { indexPregunta = 0; puntosTotales = 0; comenzarJuego(); }

    function cargarPregunta() {
        if (indexPregunta >= preguntas.length) return finalizar();
        
        document.getElementById('progreso-texto').innerText = `${indexPregunta + 1} / ${preguntas.length}`;
        
        const preg = preguntas[indexPregunta];
        const imgEl = document.getElementById('pregunta-imagen');
        
        if (preg.img) {
            imgEl.src = preg.img;
            imgEl.style.display = 'block';
        } else {
            imgEl.style.display = 'none';
        }

        tRestante = 30;
        document.getElementById('timer').innerText = tRestante;
        document.getElementById('pregunta-texto').innerText = preg.p;
        const cont = document.getElementById('opciones-container');
        cont.innerHTML = "";
        
        preg.r.forEach((opc, i) => {
            const btn = document.createElement('button');
            btn.className = `opcion btn-${i}`;
            btn.innerHTML = `<span>${letras[i]}</span> ${opc}`;
            btn.onclick = () => validar(i);
            cont.appendChild(btn);
        });

        timerInterv = setInterval(() => {
            tRestante--;
            document.getElementById('timer').innerText = tRestante;
            if (tRestante <= 0) { clearInterval(timerInterv); validar(-1); }
        }, 1000);
    }

    function validar(idx) {
        clearInterval(timerInterv);
        const correcta = preguntas[indexPregunta].c === idx;
        document.body.classList.add(correcta ? 'flash-verde' : 'flash-rojo');
        if (correcta) puntosTotales += Math.round(500 + (tRestante * 16.66));
        setTimeout(() => {
            document.body.classList.remove('flash-verde', 'flash-rojo');
            indexPregunta++; cargarPregunta();
        }, 800);
    }

    async function finalizar() {
        mostrar('loading');
        if (!usuarioActual.adm) localStorage.setItem('jugado_abril_v_final_'+usuarioActual.id, "true");
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ usuario: usuarioActual.id, puntos: puntosTotales, esAdmin: usuarioActual.adm }) });
        setTimeout(verRankingDirecto, 1500);
    }

    async function verRankingDirecto() {
        mostrar('loading');
        try {
            const r = await fetch(SCRIPT_URL), d = await r.json();
            mostrar('ranking-section');
            let lista = d.map(row => ({ id: row[0], pts: row[1], adm: row[3] == "true" || row[0] == "JR" || row[0] == "MG" }));
            if (!usuarioActual.adm) lista = lista.filter(u => !u.adm);
            lista.sort((a,b) => b.pts - a.pts);
            document.getElementById('lista-ranking').innerHTML = lista.map((u, i) => `
                <div class="ranking-item ${u.adm ? 'admin-item' : ''}">
                    <span>${i+1}. <b>${u.id}</b></span><span>${u.pts} pts</span>
                </div>`).join('') || "Sin registros.";
        } catch (e) { alert("Error de red"); cerrarSesion(); }
    }

    function cerrarSesion() { localStorage.removeItem('sesion_abril_v_final'); location.reload(); }
</script>
</body>
</html>
