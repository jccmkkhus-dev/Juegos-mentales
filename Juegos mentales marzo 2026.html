<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío Tipo Kahoot 2026 - Edición Final</title>
    <style>
        :root { --purple: #46178f; --blue: #1368ce; --green: #26890c; --red: #e21b3c; --orange: #d56a00; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f2f2f2; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 90%; max-width: 500px; text-align: center; position: relative; }
        input { width: 85%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; }
        button { background: var(--purple); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 92%; margin-top: 10px; transition: 0.2s; }
        button:hover { filter: brightness(1.1); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .btn-salir { background: #666 !important; margin-top: 20px; }
        .progreso { font-weight: bold; color: #666; margin-bottom: 5px; font-size: 0.9rem; }
        .timer { font-size: 2rem; font-weight: 900; color: var(--purple); background: #eee; width: 70px; height: 70px; line-height: 70px; border-radius: 50%; margin: 10px auto; border: 4px solid var(--purple); }
        .opciones-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .opcion { padding: 20px 10px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; min-height: 60px; text-align: center; font-size: 0.9rem; transition: transform 0.1s; }
        .opcion:active { transform: scale(0.95); }
        .btn-0 { background: var(--red); } .btn-1 { background: var(--blue); }
        .btn-2 { background: var(--orange); } .btn-3 { background: var(--green); }
        .ranking-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; font-size: 0.95rem; }
        .admin-item { background: #fff9e6 !important; border-left: 4px solid gold; }
        .admin-tag { color: #d4af37; font-weight: bold; font-size: 0.75rem; border: 1px solid #d4af37; padding: 2px 5px; border-radius: 4px; margin-left: 5px; }
        #game-section, #ranking-section, #loading { display: none; }
        .flash-verde { background-color: #2ecc71 !important; }
        .flash-rojo { background-color: #e74c3c !important; }
        .sacudir { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <div id="login-section">
        <h2 style="color: var(--purple);">🏆 Tipo Kahoot 2026</h2>
        <input type="text" id="user" placeholder="Usuario (EJ: JR)">
        <input type="password" id="pass" placeholder="Contraseña">
        <button id="btnLogin" onclick="intentarLogin()">INICIAR</button>
    </div>

    <div id="loading">
        <p><strong>Sincronizando con Drive...</strong></p>
        <button class="btn-salir" onclick="salir()">CANCELAR</button>
    </div>

    <div id="game-section">
        <div class="progreso" id="contador-preguntas">Pregunta 1/15</div>
        <div class="timer" id="timer">30</div>
        <h3 id="pregunta-texto">...</h3>
        <div class="opciones-grid" id="opciones-container"></div>
    </div>

    <div id="ranking-section">
        <h2>📊 Ranking Global</h2>
        <div id="lista-ranking" style="max-height: 350px; overflow-y: auto;"></div>
        <button class="btn-salir" onclick="salir()">CERRAR SESIÓN</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwtvxISD0sbBDgO3QIhZebCTpKxzXN83Cjv6vOzb9jWvapYzW0rxfvPWPifQcSffx_gtw/exec";
    
    const usuariosPermitidos = {
        "JR": { cl: "josue2026", adm: true }, "MG": { cl: "Lara479", adm: true },
        "JL": { cl: "zulu098", adm: false }, "RC": { cl: "Roger345", adm: false },
        "FO": { cl: "Nigan367", adm: false }, "LD": { cl: "Zeta007", adm: false },
        "LV": { cl: "Puma235", adm: false }, "MC": { cl: "pipa401", adm: false },
        "MA": { cl: "Tero012", adm: false }, "LG": { cl: "Condor666", adm: false },
        "SR": { cl: "Virus557", adm: false }, "PRUEBA": { cl: "prueba2026", adm: false }
    };

    const preguntas = [
        { p: "¿Cuál es el lugar más frío de la Tierra?", r: ["La Antártida", "Siberia", "Groenlandia", "Alaska"], c: 0 },
        { p: "¿El sonido viaja más rápido en el agua que en el aire?", r: ["Verdadero", "Falso"], c: 0 },
        { p: "¿Quién pintó 'La última cena'?", r: ["Miguel Ángel", "Da Vinci", "Picasso", "Van Gogh"], c: 1 },
        { p: "¿Cuál es el río más largo del mundo?", r: ["Nilo", "Amazonas", "Misisipi", "Yangtsé"], c: 1 },
        { p: "¿Los tiburones son mamíferos?", r: ["Verdadero", "Falso"], c: 1 },
        { p: "¿En qué continente está el desierto del Sahara?", r: ["Asia", "América", "África", "Oceanía"], c: 2 },
        { p: "¿Cuál es el símbolo químico del Oro?", r: ["Ag", "Fe", "Au", "Or"], c: 2 },
        { p: "¿El Everest es la montaña más alta sobre el nivel del mar?", r: ["Verdadero", "Falso"], c: 0 },
        { p: "¿País más grande del mundo por superficie?", r: ["China", "Rusia", "Canadá", "EE.UU."], c: 1 },
        { p: "¿En qué año llegó el hombre a la Luna?", r: ["1969", "1955", "1972", "1961"], c: 0 },
        { p: "¿Las hormigas nunca duermen?", r: ["Verdadero", "Falso"], c: 1 },
        { p: "¿Idioma con más hablantes nativos?", r: ["Inglés", "Español", "Chino Mandarín", "Hindi"], c: 2 },
        { p: "¿Cuál es el planeta más cercano al Sol?", r: ["Venus", "Marte", "Mercurio", "Tierra"], c: 2 },
        { p: "¿La Gran Muralla China se ve desde la Luna?", r: ["Verdadero", "Falso"], c: 1 },
        { p: "¿Autor de 'Don Quijote de la Mancha'?", r: ["Cervantes", "García Márquez", "Lope de Vega", "Quevedo"], c: 0 }
    ];

    let usuarioActual = null;
    let indexPregunta = 0;
    let puntosTotales = 0;
    let tRestante = 30;
    let timerInterv;
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function sonar(tipo) {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (tipo === 'ok') {
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
            if (navigator.vibrate) navigator.vibrate(200);
        } else {
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.2);
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        }
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }

    async function intentarLogin() {
        const u = document.getElementById('user').value.toUpperCase();
        const p = document.getElementById('pass').value;
        const btn = document.getElementById('btnLogin');

        if (new Date() > new Date('2026-03-31T12:00:00')) return alert("El plazo expiró el 31 de Marzo.");

        if (usuariosPermitidos[u] && usuariosPermitidos[u].cl === p) {
            usuarioActual = { id: u, adm: usuariosPermitidos[u].adm };
            btn.disabled = true;
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            try {
                const resp = await fetch(SCRIPT_URL);
                const data = await resp.json();
                const yaJugo = data.find(row => row[0] === u);

                if (yaJugo && !usuarioActual.adm) {
                    alert("Ya has participado.");
                    mostrarRanking(data);
                } else {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('game-section').style.display = 'block';
                    cargarPregunta();
                }
            } catch (e) {
                alert("Error de conexión.");
                salir();
            }
        } else { alert("Datos incorrectos."); }
    }

    function cargarPregunta() {
        if (indexPregunta >= preguntas.length) return finalizar();
        tRestante = 30;
        document.getElementById('contador-preguntas').innerText = `Pregunta ${indexPregunta + 1}/15`;
        document.getElementById('timer').innerText = tRestante;
        document.getElementById('pregunta-texto').innerText = preguntas[indexPregunta].p;
        const cont = document.getElementById('opciones-container');
        cont.innerHTML = "";
        preguntas[indexPregunta].r.forEach((opc, i) => {
            const d = document.createElement('div');
            d.className = `opcion btn-${i}`;
            d.innerText = opc;
            d.onclick = () => validar(i);
            cont.appendChild(d);
        });
        timerInterv = setInterval(() => {
            tRestante--;
            document.getElementById('timer').innerText = tRestante;
            if (tRestante <= 0) { clearInterval(timerInterv); validar(-1); }
        }, 1000);
    }

    function validar(idx) {
        clearInterval(timerInterv);
        const correcta = preguntas[indexPregunta].c === idx;
        const mainCard = document.getElementById('main-card');
        if (correcta) {
            sonar('ok');
            document.body.classList.add('flash-verde');
            puntosTotales += Math.round(500 + (tRestante * 16.66));
        } else {
            sonar('error');
            document.body.classList.add('flash-rojo');
            mainCard.classList.add('sacudir');
        }
        setTimeout(() => {
            document.body.classList.remove('flash-verde', 'flash-rojo');
            mainCard.classList.remove('sacudir');
            indexPregunta++;
            cargarPregunta();
        }, 1000);
    }

    async function finalizar() {
        document.getElementById('game-section').style.display = 'none';
        document.getElementById('loading').style.display = 'block';
        const payload = { usuario: usuarioActual.id, puntos: puntosTotales, esAdmin: usuarioActual.adm };
        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            setTimeout(async () => {
                const resp = await fetch(SCRIPT_URL);
                const data = await resp.json();
                mostrarRanking(data);
            }, 2500);
        } catch (e) { alert("Error al guardar."); salir(); }
    }

    function mostrarRanking(data) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('ranking-section').style.display = 'block';
        data.sort((a, b) => b[1] - a[1]);
        let html = "";
        if (usuarioActual.adm) {
            html += `<p style="color: gold; font-weight: bold; font-size: 0.8rem;">✨ VISTA ADMIN: COMPETENCIA JR vs MG ACTIVADA</p>`;
        }
        data.forEach((row, index) => {
            const esAdmRow = row[3] === true || row[3] === "true" || row[3] === "TRUE";
            html += `<div class="ranking-item ${esAdmRow ? 'admin-item' : ''}">
                <span>${index + 1}. <b>${row[0]}</b> ${esAdmRow ? '<span class="admin-tag">👑 ADMIN</span>' : ''}</span>
                <span>${row[1]} pts</span>
            </div>`;
        });
        document.getElementById('lista-ranking').innerHTML = html || "<p>Sin resultados.</p>";
    }

    function salir() {
        if (timerInterv) clearInterval(timerInterv);
        usuarioActual = null; indexPregunta = 0; puntosTotales = 0;
        document.getElementById('game-section').style.display = 'none';
        document.getElementById('ranking-section').style.display = 'none';
        document.getElementById('loading').style.display = 'none';
        document.getElementById('login-section').style.display = 'block';
        document.getElementById('user').value = ""; document.getElementById('pass').value = "";
        document.getElementById('btnLogin').disabled = false;
    }
</script>
</body>
</html>
